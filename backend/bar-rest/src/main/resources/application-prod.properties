# =========================================
# Perfil PRODUÇÃO — valores via variáveis de ambiente (docker-compose.yml)
# NUNCA commitar senhas reais aqui
# =========================================

# Datasource — injetado pelo Docker Compose
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# JPA — NUNCA usar update em produção
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# JWT — injetado pelo Docker Compose
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000

# CORS — apenas origem da Vercel
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Servidor
server.port=8080

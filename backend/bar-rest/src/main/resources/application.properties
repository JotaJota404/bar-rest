spring.application.name=bar-rest

# =========================================
# Datasource — PostgreSQL local
# =========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/pdv
spring.datasource.username=pdv_user
spring.datasource.password=pdv_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================================
# JPA / Hibernate
# =========================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =========================================
# JWT — trocar o secret antes de commitar em produção
# =========================================
jwt.secret=mude-este-secret-em-producao-use-256-bits-no-minimo
jwt.expiration-ms=86400000

# =========================================
# CORS — origens permitidas (local)
# =========================================
cors.allowed-origins=http://localhost:5173

# =========================================
# Servidor
# =========================================
server.port=8080
